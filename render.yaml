services:
  - type: web
    name: english-speaking-class
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: TENCENT_SECRET_ID
        sync: false
      - key: TENCENT_SECRET_KEY
        sync: false
      - key: TENCENT_REGION
        sync: false
